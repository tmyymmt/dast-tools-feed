tools:
  - id: zap
    name: OWASP ZAP
    type: github
    repo: zaproxy/zaproxy
    homepage: https://www.zaproxy.org
    features_url: https://www.zaproxy.org/docs/
    license: Apache-2.0
    pricing: Free
    description: "The world's most widely used open-source web application security scanner."
    description_ja: "世界で最も広く使われているオープンソースのWebアプリケーションセキュリティスキャナー。"
    features:
      web_scanning: true
      api_scanning: true
      authenticated_scan: true
      active_scan: true
      passive_scan: true
      crawler: true
      ci_cd: true
      report_generation: true
      saas: false
      gui: true
    unique_features:
      - "Passive proxy scanning — intercepts and analyzes all browser traffic"
      - "AJAX Spider for JavaScript-heavy single-page applications"
      - "Automation Framework for scriptable CI/CD integration"
      - "Extensive add-on marketplace for extending functionality"
      - "Headless/daemon mode with REST API for automation"
    unique_features_ja:
      - "パッシブプロキシスキャン — ブラウザのすべてのトラフィックを傍受・分析"
      - "JavaScriptを多用したSPA向けAJAXスパイダー"
      - "スクリプト可能なCI/CD連携のためのオートメーションフレームワーク"
      - "機能拡張のための豊富なアドオンマーケットプレイス"
      - "自動化用のREST APIを備えたヘッドレス/デーモンモード"

  - id: nuclei
    name: Nuclei
    type: github
    repo: projectdiscovery/nuclei
    homepage: https://nuclei.projectdiscovery.io
    features_url: https://nuclei.projectdiscovery.io/nuclei/get-started/
    license: MIT
    pricing: Free
    description: "Fast, template-based vulnerability scanner for web applications and APIs."
    description_ja: "Webアプリケーション・API向けの高速テンプレートベース脆弱性スキャナー。"
    features:
      web_scanning: true
      api_scanning: true
      authenticated_scan: true
      active_scan: true
      passive_scan: false
      crawler: false
      ci_cd: true
      report_generation: true
      saas: false
      gui: false
    unique_features:
      - "Community-driven template library with thousands of vulnerability checks"
      - "Supports HTTP, DNS, TCP, JavaScript, and headless browser protocols"
      - "Custom template creation using YAML DSL"
      - "Fuzzing support with wordlists and payload generators"
      - "Nuclei AI for automated template generation"
    unique_features_ja:
      - "数千の脆弱性チェックを含むコミュニティ主導のテンプレートライブラリ"
      - "HTTP・DNS・TCP・JavaScript・ヘッドレスブラウザプロトコルに対応"
      - "YAML DSLによるカスタムテンプレート作成"
      - "ワードリストとペイロードジェネレーターによるファジング"
      - "テンプレート自動生成のためのNuclei AI"

  - id: sqlmap
    name: sqlmap
    type: github
    repo: sqlmapproject/sqlmap
    homepage: https://sqlmap.org
    features_url: https://github.com/sqlmapproject/sqlmap/wiki
    license: GPL-2.0
    pricing: Free
    description: "Automatic SQL injection and database takeover tool."
    description_ja: "SQLインジェクションの自動検出・データベース乗っ取りツール。"
    features:
      web_scanning: false
      api_scanning: false
      authenticated_scan: true
      active_scan: true
      passive_scan: false
      crawler: true
      ci_cd: false
      report_generation: true
      saas: false
      gui: false
    unique_features:
      - "Comprehensive SQL injection detection covering all major techniques"
      - "Supports 5 injection types: boolean-based, time-based, error-based, UNION, stacked"
      - "Automatic database fingerprinting and data extraction"
      - "Direct database connection via out-of-band exploitation"
      - "Supports 30+ database management systems"
    unique_features_ja:
      - "主要な手法を網羅した包括的なSQLインジェクション検出"
      - "ブール値ベース・時間ベース・エラーベース・UNION・スタック の5種類のインジェクションに対応"
      - "データベースの自動フィンガープリントとデータ抽出"
      - "アウトオブバンドエクスプロイトによる直接データベース接続"
      - "30以上のデータベース管理システムに対応"

  - id: nikto
    name: Nikto
    type: github
    repo: sullo/nikto
    homepage: https://cirt.net/Nikto2
    features_url: https://github.com/sullo/nikto/wiki
    license: GPL-2.0
    pricing: Free
    description: "Open-source web server scanner that checks for dangerous files and misconfigurations."
    description_ja: "危険なファイルや設定ミスをチェックするオープンソースのWebサーバースキャナー。"
    features:
      web_scanning: true
      api_scanning: false
      authenticated_scan: true
      active_scan: true
      passive_scan: false
      crawler: false
      ci_cd: false
      report_generation: true
      saas: false
      gui: false
    unique_features:
      - "Checks for over 6700 potentially dangerous files and programs"
      - "Checks for outdated server software versions"
      - "Detects HTTP server configuration issues"
      - "Supports SSL/TLS scanning"
      - "Multiple output formats (plain text, XML, HTML, CSV)"
    unique_features_ja:
      - "6700以上の危険なファイルとプログラムを確認"
      - "古いサーバーソフトウェアのバージョンをチェック"
      - "HTTPサーバーの設定問題を検出"
      - "SSL/TLSスキャンに対応"
      - "複数の出力形式（テキスト・XML・HTML・CSV）"

  - id: wapiti
    name: Wapiti
    type: github
    repo: wapiti-scanner/wapiti
    homepage: https://wapiti-scanner.github.io
    features_url: https://wapiti-scanner.github.io/
    license: GPL-2.0
    pricing: Free
    description: "Web application vulnerability scanner with built-in crawler and multiple attack modules."
    description_ja: "組み込みクローラーと複数の攻撃モジュールを持つWebアプリケーション脆弱性スキャナー。"
    features:
      web_scanning: true
      api_scanning: false
      authenticated_scan: true
      active_scan: true
      passive_scan: false
      crawler: true
      ci_cd: false
      report_generation: true
      saas: false
      gui: false
    unique_features:
      - "Built-in crawler discovers URLs and forms before scanning"
      - "Detects XSS, SQL injection, CSRF, XXE, SSRF, and more"
      - "Supports headless browser rendering via Playwright"
      - "Multiple output formats (HTML, XML, JSON, TXT)"
      - "Module-based architecture for easy extension"
    unique_features_ja:
      - "スキャン前にURLとフォームを発見する組み込みクローラー"
      - "XSS・SQLインジェクション・CSRF・XXE・SSRFなどを検出"
      - "Playwrightによるヘッドレスブラウザレンダリングに対応"
      - "複数の出力形式（HTML・XML・JSON・TXT）"
      - "拡張が容易なモジュールベースのアーキテクチャ"

  - id: burpsuite
    name: Burp Suite
    type: scrape_burpsuite
    url: https://portswigger.net/burp/releases
    homepage: https://portswigger.net/burp
    features_url: https://portswigger.net/burp/documentation
    community_url: https://portswigger.net/burp/communitydownload
    pricing_url: https://portswigger.net/burp/pro
    license: Proprietary
    pricing: Free (Community) / Paid (Pro/Enterprise)
    description: "Industry-leading web security testing platform with proxy, scanner, and attack tools."
    description_ja: "プロキシ・スキャナー・攻撃ツールを備える業界標準のWebセキュリティテストプラットフォーム。"
    features:
      web_scanning: true
      api_scanning: true
      authenticated_scan: true
      active_scan: true
      passive_scan: true
      crawler: true
      ci_cd: true
      report_generation: true
      saas: true
      gui: true
    unique_features:
      - "Intercepting proxy for manual traffic inspection and modification"
      - "Burp Repeater for manual request replay and manipulation"
      - "Burp Intruder for automated customized attacks"
      - "Burp Collaborator for out-of-band vulnerability detection"
      - "BApp Store with hundreds of community extensions"
      - "Enterprise edition with scheduled scanning and team management"
    unique_features_ja:
      - "手動トラフィック検査・変更のためのインターセプティングプロキシ"
      - "手動リクエスト再送・操作のためのBurp Repeater"
      - "自動化されたカスタム攻撃のためのBurp Intruder"
      - "アウトオブバンド脆弱性検出のためのBurp Collaborator"
      - "数百のコミュニティ拡張機能を持つBAppストア"
      - "スケジュールスキャンとチーム管理を持つエンタープライズ版"
